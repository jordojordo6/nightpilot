<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NightPilot — Vancouver Photo Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: -apple-system, system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 2px solid transparent; }
  .card.bad { border-color: #ef4444; }
  .card.good { border-color: #22c55e; }
  .card.none { border-color: #666; }
  .img-wrap { width: 100%; height: 200px; background: #222; position: relative; display: flex; align-items: center; justify-content: center; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .img-wrap .no-img { color: #666; font-size: 14px; }
  .info { padding: 12px 16px; }
  .venue-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .venue-meta { font-size: 12px; color: #888; margin-bottom: 4px; }
  .venue-id { font-size: 11px; color: #555; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 6px; }
  .badge.needs-fix { background: #ef444430; color: #ef4444; }
  .badge.ok { background: #22c55e30; color: #22c55e; }
  .badge.missing { background: #66666630; color: #999; }
  .source { font-size: 11px; color: #666; margin-top: 4px; }
  .legend { display: flex; gap: 16px; margin-bottom: 24px; font-size: 13px; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 50%; }
</style>
</head>
<body>
<h1>Vancouver Venue Photo Review</h1>
<p class="subtitle">Review each photo. Red border = likely needs replacement. Green = looks usable.</p>
<div class="legend">
  <span><span class="dot" style="background:#22c55e"></span> Looks good</span>
  <span><span class="dot" style="background:#ef4444"></span> Needs better photo</span>
  <span><span class="dot" style="background:#666"></span> No photo (gradient fallback)</span>
</div>
<div class="grid" id="grid"></div>

  {id:4, name:"Miku", type:"restaurant", cuisine:"Japanese", ogImage:null, source:null, quality:"missing"},
  {id:5, name:"Vij's", type:"restaurant", cuisine:"Indian", ogImage:"http://static1.squarespace.com/static/664bced31838885ded9799eb/t/6661a9e55a8d874c7647ca3c/1717676517435/unnamed.png?format=1500w", source:"og:image", quality:"suspect"},

  {id:17, name:"The Acorn", type:"restaurant", cuisine:"Plant-Based", ogImage:"http://static1.squarespace.com/static/5fa9d1da2f5c0e204137e48f/t/5fd3f1409a52ec0c0f61a90c/1607725396739/Acorn_2_TYSON_FAST+%281%29.jpg?format=1500w", source:"og:image", quality:"good"},

  {id:22, name:"Brassneck Brewery", type:"bar", cuisine:"Brewery", ogImage:"https://brassneck.ca/app/uploads/2021/02/brssnck_015.jpg", source:"img-tag", quality:"suspect"},
  {id:23, name:"Alibi Room", type:"bar", cuisine:"Craft Beer", ogImage:"https://alibi.ca/wp-content/uploads/2024/07/353569204_1635737276940022_6581303432115868905_n.jpg", source:"og:image", quality:"good"},
  {id:24, name:"Pourhouse", type:"bar", cuisine:"Cocktail & Whiskey Bar", ogImage:"http://static1.squarespace.com/static/5db9f5cc0e8af224964d841a/t/5e45e75a78bd103b8b528dc8/1581639527237/Pourhouse-Restaurant-Cocktail-Bar-Gastown-Vancouver.jpg?format=1500w", source:"og:image", quality:"good"},

  {id:30, name:"Bar Corso", type:"bar", cuisine:"Italian Wine Bar", ogImage:"https://static.wixstatic.com/media/ae468d_4c44e75bc3fb439d8e3e6be7af43182d%7Emv2.png/v1/fit/w_2500,h_1330,al_c/ae468d_4c44e75bc3fb439d8e3e6be7af43182d%7Emv2.png", source:"og:image", quality:"suspect"},
  {id:31, name:"Back and Forth Bar", type:"bar", cuisine:"Neighbourhood Bar & Games", ogImage:"https://images.squarespace-cdn.com/content/v1/5892b875d2b857d223033974/1486011572209-4YULIABISINCLKM52F7A/IMG_3308-1.JPG", source:"chrome-hero", quality:"suspect"},
  {id:32, name:"UVA Wine & Cocktail Bar", type:"bar", cuisine:"Wine & Cocktail Bar", ogImage:"https://static.wixstatic.com/media/8385f7_3cd9e32630b740779e65b5013db80aaf.jpg/v1/fit/w_2500,h_1330,al_c/8385f7_3cd9e32630b740779e65b5013db80aaf.jpg", source:"og:image", quality:"good"},
  {id:33, name:"33 Acres Brewing", type:"bar", cuisine:"Brewery", ogImage:"https://33acresbrewing.com/app/uploads/2020/02/Web-scaled-e1581460162825.jpg", source:"og:image", quality:"good"},
  {id:34, name:"The Cambie", type:"bar", cuisine:"Dive Bar", ogImage:"https://cdn.prod.website-files.com/62fea9f2f542729be727d1af/62fea9f2f54272f93427d228_cambie-background.jpg", source:"chrome-bg", quality:"suspect"},
  {id:35, name:"Botanist", type:"bar", cuisine:"Cocktail Bar & Garden", ogImage:"https://images.getbento.com/accounts/fbd4f23e4af26f19900eba4a0162bf4a/media/images/23721botanist-cabbage-roll-2.jpg?w=5400&fit=max&auto=compress,format&cs=origin", source:"hero-image", quality:"good"},
];

const grid = document.getElementById('grid');

venues.forEach(v => {
  const card = document.createElement('div');
  card.className = 'card ' + (v.quality === 'missing' ? 'none' : v.quality === 'suspect' ? 'bad' : 'good');

  const qualityBadge = v.quality === 'missing'
    ? '<span class="badge missing">No photo</span>'
    : v.quality === 'suspect'
    ? '<span class="badge needs-fix">Needs review</span>'
    : '<span class="badge ok">Looks good</span>';

  card.innerHTML = `
    <div class="img-wrap">
      ${v.ogImage ? `<img src="${v.ogImage}" onerror="this.parentElement.innerHTML='<span class=no-img>Failed to load</span>'" />` : '<span class="no-img">No image — gradient fallback</span>'}
    </div>
    <div class="info">
      <div class="venue-name">${v.name}</div>
      <div class="venue-meta">${v.cuisine} · ${v.type}</div>
      <div class="venue-id">#${v.id}</div>
      ${qualityBadge}
      ${v.source ? `<div class="source">Source: ${v.source}</div>` : ''}
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
